<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acquisition.com Events Team Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', Arial, sans-serif; font-weight: 300; margin: 0; background: #131628; color: #ffffff; }
  header { background: #131628; color: white; padding: 18px 24px; font-size: 15px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid #2a2f4a; }
  header .sub { color: #a08bec; font-weight: 600; font-size: 12px; margin-left: 10px; letter-spacing: 1px; }
  .tabs { display: flex; background: #131628; border-bottom: 1px solid #2a2f4a; padding: 0 12px; overflow-x: auto; }
  .tab { padding: 12px 20px; cursor: pointer; font-weight: 600; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #d1d1d1; border-bottom: 3px solid transparent; white-space: nowrap; }
  .tab.active { color: #ffffff; border-bottom-color: #6f00ff; }
  .panel { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  .panel.active { display: block; }
  .weeklabel { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #a08bec; margin: 24px 0 16px; }
  .weeklabel:first-child { margin-top: 0; }
  .timerbar { background: #1b2038; border-radius: 10px; padding: 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .timerbar .label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #a08bec; }
  .timerbar .display { font-size: 56px; font-weight: 800; color: #ffffff; min-width: 160px; line-height: 1; }
  .timerbar .display.warn { color: #a08bec; }
  .timerbar .display.done { color: #6f00ff; font-size: 34px; letter-spacing: 2px; }
  .timerbar .btns { margin-left: auto; display: flex; gap: 8px; }
  .timerbar button { padding: 10px 20px; border: 1px solid #6f00ff; background: transparent; color: #ffffff; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px; letter-spacing: 0.5px; border-radius: 20px; }
  .timerbar button:hover { background: #6f00ff; }
  .timerbar button.reset { border-color: #2a2f4a; color: #d1d1d1; }
  .timerbar button.reset:hover { background: #2a2f4a; color: #ffffff; }
  .card { background: #1b2038; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
  .qnum { font-size: 11px; font-weight: 600; color: #a08bec; text-transform: uppercase; letter-spacing: 1px; }
  .qtext { font-size: 16px; margin: 8px 0 14px; }
  .answer { font-size: 13px; color: #d1d1d1; margin-bottom: 14px; cursor: pointer; }
  .answer span { display: none; font-weight: 600; color: #a08bec; }
  .answer.revealed span { display: inline; }
  .members { display: flex; flex-wrap: wrap; gap: 8px; }
  .members button { padding: 8px 16px; border: 1px solid #6f00ff; background: transparent; border-radius: 20px;
               font-size: 13px; color: #ffffff; cursor: pointer; font-family: inherit; font-weight: 300; }
  .members button:hover { background: #6f00ff; }
  .members button:disabled { opacity: 0.5; cursor: wait; }
  .winners { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .won { display: inline-block; background: #a08bec; color: #131628; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; }
  .hint { font-size: 11px; color: #8b8fa8; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; background: #1b2038; border-radius: 10px; overflow: hidden; }
  th, td { padding: 13px 16px; text-align: left; border-bottom: 1px solid #2a2f4a; }
  th { background: #131628; color: #a08bec; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  tr:first-child td { font-weight: 600; color: #a08bec; }
  .medal { font-size: 16px; }
  .toggle { margin-bottom: 16px; }
  .toggle button { padding: 8px 18px; border: none; background: #1b2038; color: #d1d1d1; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; }
  .toggle button:first-child { border-radius: 6px 0 0 6px; }
  .toggle button:last-child { border-radius: 0 6px 6px 0; }
  .toggle button.on { background: #6f00ff; color: #ffffff; }
  .muted { color: #8b8fa8; font-size: 14px; }
</style>
</head>
<body>
<header>ACQUISITION.COM<span class="sub">EVENTS TEAM TRIVIA</span></header>
<div class="tabs">
  <div class="tab active" onclick="showPanel('week', this)">This Week</div>
  <div class="tab" onclick="showPanel('upcoming', this)">Upcoming</div>
  <div class="tab" onclick="showPanel('archive', this)">Archive</div>
  <div class="tab" onclick="showPanel('standings', this)">Standings</div>
</div>

<div id="week" class="panel active"><p class="muted">Loading&hellip;</p></div>

<div id="upcoming" class="panel"><p class="muted">Loading&hellip;</p></div>

<div id="archive" class="panel"><p class="muted">Loading&hellip;</p></div>

<div id="standings" class="panel">
  <div class="toggle">
    <button id="btnMonth" class="on" onclick="setPeriod('month')">This Month</button>
    <button id="btnQuarter" onclick="setPeriod('quarter')">This Quarter</button>
  </div>
  <div id="standingsTable"></div>
</div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/15Ojdvg5oPfE87x84fEAlYnrFZd5ixg1yf3rt1dwQryM/gviz/tq?tqx=out:csv';
const SCRIPT_URL = 'https://script.google.com/a/macros/acquisition.com/s/AKfycbxTC0MavqdWbX13JGpaJIp--RtE5_LFUcEyFCQ9k0YklGPmoCHEtId8Axpeccz_ctw/exec';

let DATA = { questions: [], team: [], results: [] };
let period = 'month';
let bigTimer = null;

function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return date.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
}

function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { cur += '"'; i++; }
        else inQ = false;
      } else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur = ''; }
      else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
      else if (c !== '\r') cur += c;
    }
  }
  if (cur.length || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function showPanel(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

async function load() {
  try {
    const [sheetText, live] = await Promise.all([
      fetch(SHEET_CSV + '&cachebust=' + Date.now()).then(x => x.text()),
      fetch(SCRIPT_URL + '?t=' + Date.now()).then(x => x.json())
    ]);
    const rows = parseCSV(sheetText);
    const questions = rows.slice(1)
      .filter(r2 => r2.length >= 5 && r2[3] && r2[3].trim())
      .map(r2 => {
        const dateStr = (r2[1] || '').trim();
        const parsed = new Date(dateStr);
        return {
          week: isNaN(parsed) ? '' : isoWeek(parsed),
          label: (r2[0] || '').trim(),
          date: dateStr,
          num: Number((r2[2] || '').trim()),
          question: (r2[3] || '').trim(),
          answer: (r2[4] || '').trim()
        };
      });
    DATA = { questions: questions, team: live.team, results: live.results };
    renderAll();
  } catch (e) {
    document.getElementById('week').innerHTML =
      '<p class="muted">Could not load data. Check the sheet sharing, the Results and Team tabs, and the Apps Script deployment (Who has access: Anyone). (' + e.message + ')</p>';
  }
}

function renderAll() {
  renderWeek();
  renderUpcoming();
  renderArchive();
  renderStandings();
}

async function refreshLive() {
  try {
    const live = await fetch(SCRIPT_URL + '?t=' + Date.now()).then(x => x.json());
    DATA.team = live.team;
    DATA.results = live.results;
    renderAll();
  } catch (e) {}
}

async function record(week, num, member, btn) {
  if (btn) btn.disabled = true;
  DATA.results.push({ ts: new Date().toISOString(), week: week, num: num, winner: member, points: 1 });
  renderAll();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ week: week, num: num, winner: member })
    });
  } catch (e) {
    alert('Could not save the point. Check the Apps Script deployment ("Who has access" should be Anyone), then refresh.');
  }
  setTimeout(refreshLive, 1500);
}

function startTimer(seconds) {
  if (bigTimer) clearInterval(bigTimer);
  let remaining = seconds;
  const disp = document.getElementById('bigtimer');
  const tick = () => {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    disp.textContent = m + ':' + String(s).padStart(2, '0');
    disp.className = 'display' + (remaining <= 10 ? ' warn' : '');
    if (remaining <= 0) {
      clearInterval(bigTimer);
      bigTimer = null;
      disp.textContent = "TIME'S UP!";
      disp.className = 'display done';
    }
    remaining--;
  };
  tick();
  bigTimer = setInterval(tick, 1000);
}

function resetTimer() {
  if (bigTimer) clearInterval(bigTimer);
  bigTimer = null;
  const disp = document.getElementById('bigtimer');
  disp.textContent = '0:00';
  disp.className = 'display';
}

function winnersFor(q) {
  return DATA.results.filter(r => r.week === q.week && Number(r.num) === Number(q.num)).map(r => r.winner);
}

function questionCard(q, withScoring) {
  const winners = winnersFor(q);
  const winnerBadges = winners.length
    ? '<div class="winners">' + winners.map(w => '<span class="won">&#9989; ' + w + '</span>').join('') + '</div>'
    : '';
  let footer = '';
  if (withScoring) {
    const remaining = DATA.team.filter(m => !winners.includes(m));
    footer = remaining.length
      ? '<div class="members">' +
          remaining.map(m => '<button onclick="record(\'' + q.week + '\',' + q.num + ',\'' + m.replace(/'/g, "\\'") + '\', this)">' + m + '</button>').join('') +
        '</div><div class="hint">Tap each person who got it right. Points save instantly.</div>'
      : '<div class="hint">Everyone got this one! &#127881;</div>';
  }
  return '<div class="card">' +
    '<div class="qnum">Question ' + q.num + '</div>' +
    '<div class="qtext">' + q.question + '</div>' +
    '<div class="answer" onclick="this.classList.toggle(\'revealed\')">Tap to reveal answer: <span>' + q.answer + '</span></div>' +
    winnerBadges + footer + '</div>';
}

function groupByWeek(list) {
  const map = {};
  list.forEach(q => { (map[q.week] = map[q.week] || []).push(q); });
  return Object.keys(map).sort().map(w => map[w].sort((a, b) => a.num - b.num));
}

function renderWeek() {
  const el = document.getElementById('week');
  const cw = isoWeek(new Date());
  const qs = DATA.questions.filter(q => q.week === cw).sort((a, b) => a.num - b.num);
  if (!qs.length) {
    el.innerHTML = '<p class="muted">No questions for this week yet. Add rows to the Google Sheet with a Date that falls in the current week.</p>';
    return;
  }
  const timerBar = '<div class="timerbar">' +
    '<div><div class="label">Timer</div><div class="display" id="bigtimer">0:00</div></div>' +
    '<div class="btns">' +
      '<button onclick="startTimer(30)">30 sec</button>' +
      '<button onclick="startTimer(60)">1 min</button>' +
      '<button class="reset" onclick="resetTimer()">Reset</button>' +
    '</div>' +
  '</div>';
  el.innerHTML = '<div class="weeklabel">' + (qs[0].label || 'This week') + ' &middot; ' + qs[0].date + '</div>' +
    timerBar + qs.map(q => questionCard(q, true)).join('');
}

function renderUpcoming() {
  const el = document.getElementById('upcoming');
  const cw = isoWeek(new Date());
  const groups = groupByWeek(DATA.questions.filter(q => q.week && q.week > cw));
  if (!groups.length) {
    el.innerHTML = '<p class="muted">No upcoming rounds yet. Add rows to the Google Sheet with a future date and they will appear here.</p>';
    return;
  }
  el.innerHTML = groups.map(g =>
    '<div class="weeklabel">' + (g[0].label || g[0].week) + ' &middot; ' + g[0].date + '</div>' +
    g.map(q => questionCard(q, false)).join('')
  ).join('');
}

function renderArchive() {
  const el = document.getElementById('archive');
  const cw = isoWeek(new Date());
  const groups = groupByWeek(DATA.questions.filter(q => q.week && q.week < cw)).reverse();
  if (!groups.length) {
    el.innerHTML = '<p class="muted">No past rounds yet. Finished rounds will appear here automatically.</p>';
    return;
  }
  el.innerHTML = groups.map(g =>
    '<div class="weeklabel">' + (g[0].label || g[0].week) + ' &middot; ' + g[0].date + '</div>' +
    g.map(q => questionCard(q, false)).join('')
  ).join('');
}

function setPeriod(p) {
  period = p;
  document.getElementById('btnMonth').classList.toggle('on', p === 'month');
  document.getElementById('btnQuarter').classList.toggle('on', p === 'quarter');
  renderStandings();
}

function renderStandings() {
  const now = new Date();
  const qStartMonth = Math.floor(now.getMonth() / 3) * 3;
  const start = period === 'month'
    ? new Date(now.getFullYear(), now.getMonth(), 1)
    : new Date(now.getFullYear(), qStartMonth, 1);

  const totals = {};
  DATA.team.forEach(m => totals[m] = 0);
  DATA.results.forEach(r => {
    if (new Date(r.ts) >= start) totals[r.winner] = (totals[r.winner] || 0) + (r.points || 1);
  });

  const rows = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const medals = ['&#129351;', '&#129352;', '&#129353;'];
  document.getElementById('standingsTable').innerHTML =
    '<table><tr><th></th><th>Team Member</th><th>Points</th></tr>' +
    rows.map(([m, p], i) =>
      '<tr><td class="medal">' + (medals[i] || (i + 1)) + '</td><td>' + m + '</td><td>' + p + '</td></tr>'
    ).join('') + '</table>';
}

load();
</script>
</body>
</html>
