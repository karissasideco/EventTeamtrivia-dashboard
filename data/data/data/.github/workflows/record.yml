name: Record Trivia Winner

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  record:
    if: startsWith(github.event.issue.title, 'record|')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update results
        id: update
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          WEEK=$(echo "$TITLE" | cut -d'|' -f2)
          NUM=$(echo "$TITLE" | cut -d'|' -f3)
          WINNER=$(echo "$TITLE" | cut -d'|' -f4-)

          if jq -e --arg w "$WEEK" --argjson n "$NUM" \
             'any(.[]; .week == $w and .num == $n)' data/results.json > /dev/null; then
            echo "status=duplicate" >> "$GITHUB_OUTPUT"
          else
            jq --arg w "$WEEK" --argjson n "$NUM" --arg who "$WINNER" \
               --arg ts "$(date -u +%FT%TZ)" \
               '. += [{ts: $ts, week: $w, num: $n, winner: $who, points: 1}]' \
               data/results.json > tmp.json && mv tmp.json data/results.json

            git config user.name "trivia-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.json
            git commit -m "🏆 $WINNER wins $WEEK Q$NUM"
            git push
            echo "status=recorded" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.update.outputs.status }}" = "duplicate" ]; then
            gh issue close ${{ github.event.issue.number }} -R ${{ github.repository }} \
              -c "⚠️ That question already has a recorded winner. Delete the entry in data/results.json first if this was a mistake."
          else
            gh issue close ${{ github.event.issue.number }} -R ${{ github.repository }} \
              -c "✅ Recorded! The dashboard will update in ~30 seconds."
          fi
